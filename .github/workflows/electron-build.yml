name: Electron Desktop Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      draft_release:
        description: 'Create as draft release?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB: Build & Package Electron App for Windows (x64)
  # ═══════════════════════════════════════════════════════════════════════════
  build-windows:
    name: "Build Windows Installer & Portable"
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: node scripts/build-mobile.js

      - name: Build Electron app (NSIS + Portable)
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist output
        run: Get-ChildItem dist -Recurse | Select-Object FullName

      - name: Upload Windows NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: smart-learn-windows-installer
          path: dist/*.exe
          retention-days: 90

      - name: Upload Windows Portable
        uses: actions/upload-artifact@v4
        with:
          name: smart-learn-windows-portable
          path: dist/*portable*.exe
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB: Publish GitHub Release (only on tag push)
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: "Publish GitHub Release"
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: smart-learn-windows-installer
          path: release-assets/

      - name: Download Windows portable artifacts
        uses: actions/download-artifact@v4
        with:
          name: smart-learn-windows-portable
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event.inputs.draft_release == 'true' }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
