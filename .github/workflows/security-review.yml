name: Security Review — Smart Learn Backend

on:
  push:
    branches: [ "main", "develop", "master" ]
  pull_request:
    branches: [ "main", "develop", "master" ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Technology Detection
  # ─────────────────────────────────────────────────────────────────────────
  detect-stack:
    name: "Phase 1 — Backend Technology Detection"
    runs-on: ubuntu-latest
    outputs:
      is_nodejs: ${{ steps.detect.outputs.is_nodejs }}
      node_version: ${{ steps.detect.outputs.node_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect technology stack
        id: detect
        run: |
          echo "Detecting technology stack..."
          if [ -f "package.json" ]; then
            echo "is_nodejs=true" >> $GITHUB_OUTPUT
            echo "Detected: Node.js application"
            # Extract node version requirement
            node_ver=$(node -e "const p=require('./package.json'); console.log(p.engines && p.engines.node || '>=16')" 2>/dev/null || echo ">=16")
            echo "node_version=20" >> $GITHUB_OUTPUT
          else
            echo "is_nodejs=false" >> $GITHUB_OUTPUT
            echo "node_version=20" >> $GITHUB_OUTPUT
          fi
          
          echo "## Technology Stack Detected" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | Node.js / Express |" >> $GITHUB_STEP_SUMMARY
          echo "| Database | SQLite3 |" >> $GITHUB_STEP_SUMMARY
          echo "| Shell | Electron |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: SAST & Lint Security Checks
  # ─────────────────────────────────────────────────────────────────────────
  sast-scan:
    name: "Phase 3 — SAST Code Analysis"
    runs-on: ubuntu-latest
    needs: detect-stack
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.detect-stack.outputs.node_version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Check for hardcoded secrets (grep-based)
        run: |
          echo "Scanning for hardcoded credentials and secrets..."
          FOUND=0
          
          # Check for hardcoded passwords in source files (excluding node_modules)
          if grep -rn --include="*.js" --exclude-dir=node_modules \
            -E "(password\s*=\s*['\"][\w!@#]{3,}['\"]|secret\s*=\s*['\"][^'\"]{8,}['\"]|api_key\s*=\s*['\"][^'\"]{8,}['\"])" .; then
            echo "WARNING: Potential hardcoded secrets found!"
            FOUND=1
          fi
          
          # Check for password in plain DB inserts
          if grep -n "password123\|admin123\|test123\|abc123" server.js auth.js 2>/dev/null; then
            echo "WARNING: Default/hardcoded password found!"
            FOUND=1
          fi

          echo "SAST_SECRETS_FOUND=$FOUND" >> $GITHUB_ENV

      - name: Check for missing auth middleware
        run: |
          echo "Checking authentication coverage..."
          UNPROTECTED=$(grep -n "^app\.\(get\|post\|put\|delete\)" server.js | grep -v "requireUser\|auth/login\|auth/register\|auth/google\|static\|sendFile" | wc -l)
          echo "Routes without requireUser middleware: $UNPROTECTED"
          echo "UNPROTECTED_ROUTES=$UNPROTECTED" >> $GITHUB_ENV

      - name: Check for security middleware
        run: |
          echo "Checking for security middleware..."
          HAS_HELMET=0
          HAS_RATE_LIMIT=0
          HAS_CORS_RESTRICT=0
          
          grep -q "helmet" package.json && HAS_HELMET=1 || true
          grep -q "express-rate-limit" package.json && HAS_RATE_LIMIT=1 || true
          grep -q "origin:" server.js && HAS_CORS_RESTRICT=1 || true
          
          echo "HAS_HELMET=$HAS_HELMET" >> $GITHUB_ENV
          echo "HAS_RATE_LIMIT=$HAS_RATE_LIMIT" >> $GITHUB_ENV
          echo "HAS_CORS_RESTRICT=$HAS_CORS_RESTRICT" >> $GITHUB_ENV
          
          echo "## SAST Results" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Helmet (security headers) | $([ $HAS_HELMET -eq 1 ] && echo '✅ Present' || echo '❌ Missing') |" >> $GITHUB_STEP_SUMMARY
          echo "| Rate Limiting | $([ $HAS_RATE_LIMIT -eq 1 ] && echo '✅ Present' || echo '❌ Missing') |" >> $GITHUB_STEP_SUMMARY
          echo "| CORS Restriction | $([ $HAS_CORS_RESTRICT -eq 1 ] && echo '✅ Present' || echo '❌ Missing') |" >> $GITHUB_STEP_SUMMARY

      - name: Check for plaintext password storage
        run: |
          echo "Checking password handling..."
          PLAINTEXT_PW=0
          
          # Check if bcrypt is used
          if ! grep -q "bcrypt\|argon2\|pbkdf2\|scrypt" server.js; then
            echo "CRITICAL: No password hashing detected in server.js!"
            PLAINTEXT_PW=1
          fi
          
          if grep -q "password\s*!==\s*password\|password\s*===\s*password" server.js auth.js 2>/dev/null; then
            echo "CRITICAL: Plaintext password comparison detected!"
            PLAINTEXT_PW=1
          fi
          
          echo "PLAINTEXT_PW=$PLAINTEXT_PW" >> $GITHUB_ENV

      - name: Check for SQL injection patterns
        run: |
          echo "Checking for SQL injection risks..."
          # Check for string concatenation in SQL queries
          if grep -n "query.*+\|query.*\`.*\$" server.js 2>/dev/null | grep -v "//"; then
            echo "WARNING: Potential SQL string concatenation detected"
          else
            echo "OK: No obvious SQL concatenation patterns found"
          fi

      - name: Check static file serving risk
        run: |
          echo "Checking static file serving configuration..."
          if grep -q "express.static.*__dirname" server.js; then
            echo "CRITICAL: Entire __dirname is served statically — database and source code exposed!"
          fi

      - name: Generate SAST summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Critical Issues" >> $GITHUB_STEP_SUMMARY
          [ "$PLAINTEXT_PW" = "1" ] && echo "- 🔴 **CRITICAL**: Plaintext password storage detected" >> $GITHUB_STEP_SUMMARY
          [ "$SAST_SECRETS_FOUND" = "1" ] && echo "- 🔴 **CRITICAL**: Hardcoded secrets found in source code" >> $GITHUB_STEP_SUMMARY
          [ "$HAS_HELMET" = "0" ] && echo "- 🟠 **HIGH**: Helmet.js not installed (missing security headers)" >> $GITHUB_STEP_SUMMARY
          [ "$HAS_RATE_LIMIT" = "0" ] && echo "- 🟠 **HIGH**: express-rate-limit not installed (brute-force risk)" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: Dependency Vulnerability Scan
  # ─────────────────────────────────────────────────────────────────────────
  dependency-scan:
    name: "Phase 5 — Dependency / SCA Scan"
    runs-on: ubuntu-latest
    needs: detect-stack
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.detect-stack.outputs.node_version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run npm audit
        id: npm_audit
        run: |
          echo "Running npm audit..."
          # Run audit and capture output (allow failure for HIGH, fail only on critical)
          npm audit --audit-level=critical --json > npm_audit_report.json 2>&1 || true
          npm audit --audit-level=high 2>&1 | tee npm_audit_summary.txt || true
          
          # Count severity levels
          CRITICAL=$(cat npm_audit_report.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))" 2>/dev/null || echo 0)
          HIGH=$(cat npm_audit_report.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('high',0))" 2>/dev/null || echo 0)
          
          echo "CRITICAL_VULNS=$CRITICAL" >> $GITHUB_ENV
          echo "HIGH_VULNS=$HIGH" >> $GITHUB_ENV
          
          echo "## Dependency Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY

      - name: Check for missing security packages
        run: |
          echo "Checking for recommended security packages..."
          MISSING=""
          for pkg in helmet express-rate-limit bcrypt jsonwebtoken express-validator; do
            if ! grep -q "\"$pkg\"" package.json; then
              MISSING="$MISSING $pkg"
              echo "MISSING: $pkg"
            fi
          done
          
          if [ -n "$MISSING" ]; then
            echo "## Missing Security Packages" >> $GITHUB_STEP_SUMMARY
            for pkg in $MISSING; do
              echo "- ⚠️  \`$pkg\` is not installed" >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: |
            npm_audit_report.json
            npm_audit_summary.txt
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4: Generate Security Reports
  # ─────────────────────────────────────────────────────────────────────────
  generate-reports:
    name: "Phase 6 — Generate Security Reports"
    runs-on: ubuntu-latest
    needs: [sast-scan, dependency-scan]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install openpyxl

      - name: Generate Excel security report
        run: |
          cd "Vulnerability Test Results"
          python generate_security_reports.py

      - name: Upload security reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            Vulnerability Test Results/findings.xlsx
            Vulnerability Test Results/endpoint-inventory.xlsx
            Vulnerability Test Results/security-review.md
            Vulnerability Test Results/executive-summary.md
            Vulnerability Test Results/dependency-report.md
          retention-days: 90

      - name: Publish summary to GitHub Actions
        run: |
          echo "## Security Assessment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Report | Location |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Findings Excel | findings.xlsx |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Review | security-review.md |" >> $GITHUB_STEP_SUMMARY
          echo "| Executive Summary | executive-summary.md |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Report | dependency-report.md |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> All reports are available in the **security-reports** artifact." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 5: Security Gate — Fail on Critical Findings
  # ─────────────────────────────────────────────────────────────────────────
  security-gate:
    name: "Security Gate — Fail on Critical"
    runs-on: ubuntu-latest
    needs: [sast-scan, dependency-scan, generate-reports]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Evaluate critical security findings
        run: |
          FAIL=0
          
          echo "## Security Gate Evaluation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check plaintext passwords
          if ! grep -q "bcrypt\|argon2\|pbkdf2\|scrypt" server.js; then
            echo "GATE FAIL: Plaintext password storage detected (FINDING-001)"
            echo "- ❌ **GATE FAIL**: Plaintext password storage (FINDING-001)" >> $GITHUB_STEP_SUMMARY
            FAIL=1
          fi
          
          # Check auth mechanism
          if ! grep -q "jsonwebtoken\|jwt\|passport" package.json server.js; then
            echo "GATE WARN: No JWT/token authentication detected (FINDING-002)"
            echo "- ⚠️ **GATE WARN**: No JWT authentication (FINDING-002)" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check static file exposure of database
          if grep -q "express.static.*__dirname" server.js; then
            echo "GATE FAIL: Database file exposed via static serving (FINDING-014)"
            echo "- ❌ **GATE FAIL**: Database file exposed via HTTP (FINDING-014)" >> $GITHUB_STEP_SUMMARY
            FAIL=1
          fi
          
          if [ $FAIL -eq 1 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ❌ Security Gate FAILED" >> $GITHUB_STEP_SUMMARY
            echo "Critical vulnerabilities detected. Merge is blocked until resolved." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "### ✅ Security Gate PASSED" >> $GITHUB_STEP_SUMMARY
            echo "No blocking critical vulnerabilities detected." >> $GITHUB_STEP_SUMMARY
          fi
