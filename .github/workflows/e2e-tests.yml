name: Unified E2E Testing Suite

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: Android Appium Mobile E2E Testing
  # ═══════════════════════════════════════════════════════════════════════════
  appium-tests:
    name: "Run Mobile Appium E2E Tests"
    runs-on: macos-15-intel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Web Application
        run: |
          npm install
          node scripts/build-mobile.js

      - name: Build Capacitor Android App
        run: |
          npx cap sync android

      - name: Compile Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Excel dependencies
        run: |
          pip install openpyxl

      - name: Install Appium testing packages
        run: |
          cd tests/appium-tests
          npm install

      - name: Run Appium Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          script: |
            chmod +x tests/appium-tests/run-tests.sh
            cd tests/appium-tests && ./run-tests.sh

      - name: Generate Automation Reports
        run: |
          cd tests/appium-tests
          npm run report

      - name: Upload Appium Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-test-results
          path: tests/appium-tests/Test Results/
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: Web Selenium E2E Testing
  # ═══════════════════════════════════════════════════════════════════════════
  selenium-tests:
    name: "Run Web Selenium E2E Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm install
          node scripts/build-mobile.js
          cd tests/selenium-tests
          npm install

      - name: Start Express Server
        run: |
          node backend/server.js &
          echo "Waiting for server to initialize..."
          sleep 5

      - name: Run Selenium Tests (Headless)
        run: |
          cd tests/selenium-tests
          mkdir -p "Test Results/Logs"
          BASE_URL="http://localhost:8080" \
          HEADLESS=true \
          npx mocha tests/login.test.js --reporter mochawesome --timeout 60000 --exit 2>&1 | tee "Test Results/Logs/execution.log" || true

      - name: Install Python Excel dependencies
        run: |
          pip install openpyxl

      - name: Generate Reports and Metrics
        run: |
          cd tests/selenium-tests
          BASE_URL="http://localhost:8080" \
          python generate_final_reports.py

      - name: Upload Selenium Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-test-results
          path: |
            tests/selenium-tests/Test Results/Excel/Automation_Test_Report.xlsx
            tests/selenium-tests/Test Results/HTML/execution-report.html
            tests/selenium-tests/Test Results/Screenshots/
            tests/selenium-tests/Test Results/Logs/
            tests/selenium-tests/Test Results/Summary/summary.md
          retention-days: 90
