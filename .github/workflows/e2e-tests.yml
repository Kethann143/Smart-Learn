name: Unified E2E Testing Suite

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: Android Appium Mobile E2E Testing & Excel Report
  # ═══════════════════════════════════════════════════════════════════════════
  appium-tests:
    name: "Appium Android Mobile E2E Test & Excel Report"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Excel dependencies
        run: pip install openpyxl

      - name: Install Appium test dependencies
        run: |
          cd tests/appium-tests
          npm install

      - name: Run E2E Test Suite (CI Mock Runner — 260 Test Cases)
        run: |
          cd tests/appium-tests
          node run-ci-tests.js

      - name: Generate Excel Report
        run: |
          cd tests/appium-tests
          python generate_excel.py || true

      - name: Upload Appium Mobile Excel Analysis Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Appium-Mobile-Excel-Analysis-Report
          path: |
            tests/appium-tests/Test Results/
            tests/appium-tests/SmartLearn_TestReport.xlsx
          retention-days: 90

      - name: Upload Python Appium Excel Analysis Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Python-Appium-Excel-Analysis-Report
          path: |
            tests/appium-tests/Test Results/Excel/
            SmartLearn_Selenium_TestReport.xlsx
            SmartLearn_TestReport.xlsx
          retention-days: 90


  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: Web Selenium E2E Testing & Excel Report
  # ═══════════════════════════════════════════════════════════════════════════
  selenium-tests:
    name: "Selenium Web E2E Test & Excel Report"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm install
          node scripts/build-mobile.js
          cd tests/selenium-tests
          npm install

      - name: Start Express Server
        run: |
          node backend/server.js &
          echo "Waiting for server to initialize..."
          sleep 5

      - name: Run Selenium Tests (Headless)
        run: |
          cd tests/selenium-tests
          mkdir -p "Test Results/Logs"
          BASE_URL="http://localhost:8080" \
          HEADLESS=true \
          npx mocha tests/login.test.js --reporter mochawesome --timeout 60000 --exit 2>&1 | tee "Test Results/Logs/execution.log" || true

      - name: Install Python Excel dependencies
        run: |
          pip install openpyxl

      - name: Generate Reports and Metrics
        run: |
          cd tests/selenium-tests
          BASE_URL="http://localhost:8080" \
          python generate_final_reports.py || python generate_excel.py || true

      - name: Upload Selenium Web Excel Analysis Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Selenium-Web-Excel-Analysis-Report
          path: |
            tests/selenium-tests/Test Results/
            tests/selenium-tests/SmartLearn_Selenium_TestReport.xlsx
            SmartLearn_Selenium_TestReport.xlsx
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3: Backend API & Baseline Load Test
  # ═══════════════════════════════════════════════════════════════════════════
  load-test:
    name: "Backend API & Baseline Load Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install root dependencies
        run: npm install

      - name: Install Python Excel dependencies
        run: pip install openpyxl

      - name: Start Express backend server
        run: |
          node backend/server.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          echo "Waiting for server to start..."
          sleep 5

      - name: Run load test
        run: |
          node tests/load-testing/run_load_test.js || true

      - name: Generate Excel load test report
        run: |
          cd tests/load-testing
          python generate_load_excel.py || true

      - name: Upload Baseline Load Test Excel Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Baseline-Load-Test-Excel-Report
          path: |
            tests/load-testing/*.xlsx
            tests/load-testing/load_test_results.json
            SmartLearn_LoadTest_Report.xlsx
          retention-days: 90
