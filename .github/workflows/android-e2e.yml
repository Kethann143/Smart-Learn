name: Android Appium E2E Testing

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: Build APK & Execute Appium E2E Tests
  # ═══════════════════════════════════════════════════════════════════════════
  appium-test:
    name: "Build App and Run Appium Tests"
    runs-on: macos-15-intel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Build web assets and Capacitor Android target
      - name: Build Web Application
        run: |
          npm install
          node build-mobile.js

      - name: Build Capacitor Android App
        run: |
          npx cap sync android

      - name: Compile Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Excel dependencies
        run: |
          pip install openpyxl

      - name: Install Appium testing packages
        run: |
          cd appium-tests
          npm install

      - name: Run Appium Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          script: |
            # Start Appium Server in background
            cd appium-tests
            npx appium --log ./appium-server.log &
            
            # Install App APK on Emulator
            adb install ../android/app/build/outputs/apk/debug/app-debug.apk
            
            # Run Jasmine test specs
            npm test || true

      - name: Generate Automation Reports
        run: |
          cd appium-tests
          npm run report

      - name: Upload Test Results Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-e2e-test-results
          path: appium-tests/Test Results/
          retention-days: 90

      - name: Push Test Reports to GitHub Pages
        if: always()
        run: |
          if [ -d "appium-tests/Test Results" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            # Clone gh-pages branch or init new if absent
            git clone --branch gh-pages "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" temp-gh-pages || {
              mkdir temp-gh-pages
              cd temp-gh-pages
              git init
              git checkout -b gh-pages
              git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
              cd ..
            }
            
            # Sync frontend index.html and scripts so web app stays active in root page
            cp index.html styles.css app.js auth.js ai.js db.js federated.js manifest.json temp-gh-pages/ 2>/dev/null || true
            mkdir -p temp-gh-pages/assets
            cp -r assets/* temp-gh-pages/assets/ 2>/dev/null || true
            
            # Setup reports paths
            RUN_NUM="${{ github.run_number }}"
            mkdir -p temp-gh-pages/reports/latest/screenshots
            mkdir -p temp-gh-pages/reports/latest/logs
            mkdir -p temp-gh-pages/reports/history/build-${RUN_NUM}/screenshots
            mkdir -p temp-gh-pages/reports/history/build-${RUN_NUM}/logs
            
            # Copy reports to latest/
            cp "appium-tests/Test Results/HTML/execution-report.html" temp-gh-pages/reports/latest/
            cp "appium-tests/Test Results/Summary/summary.md" temp-gh-pages/reports/latest/
            cp -r "appium-tests/Test Results/Screenshots/"* temp-gh-pages/reports/latest/screenshots/ 2>/dev/null || true
            cp -r "appium-tests/Test Results/Logs/"* temp-gh-pages/reports/latest/logs/ 2>/dev/null || true
            
            # Copy reports to history/build-xxx/
            cp "appium-tests/Test Results/HTML/execution-report.html" temp-gh-pages/reports/history/build-${RUN_NUM}/
            cp "appium-tests/Test Results/Summary/summary.md" temp-gh-pages/reports/history/build-${RUN_NUM}/
            cp -r "appium-tests/Test Results/Screenshots/"* temp-gh-pages/reports/history/build-${RUN_NUM}/screenshots/ 2>/dev/null || true
            cp -r "appium-tests/Test Results/Logs/"* temp-gh-pages/reports/history/build-${RUN_NUM}/logs/ 2>/dev/null || true
            
            # Commit and push report update
            cd temp-gh-pages
            git add .
            git commit -m "Deploy Appium reports for build #${RUN_NUM}"
            git push origin gh-pages
          else
            echo "No test results directory found. Skipping Pages deploy."
          fi

      - name: Publish Summary to GITHUB_STEP_SUMMARY
        if: always()
        run: |
          if [ -f "appium-tests/Test Results/Summary/summary.md" ]; then
            cat "appium-tests/Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "No summary.md file found."
          fi
